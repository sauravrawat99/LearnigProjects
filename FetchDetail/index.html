<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fetch Data Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="main1">
      <div id="main">
        <form id="form">
          <h2>User Form</h2>

          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your name"
            required
          />

          <label for="age">Age</label>
          <input
            type="number"
            id="age"
            name="age"
            placeholder="Enter your age"
            required
          />

          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />

          <label for="mobile">Mobile Number</label>
          <input
            type="tel"
            id="mobile"
            name="mobile"
            placeholder="Enter mobile number"
            required
          />

          <button type="submit">Submit</button>
        </form>
      </div>
    </div>
    <div id="card_box">
      <div id="card">
        <h2 id="card_name">Name: saurav rawat</h2>
        <p id="card_age">Age:22</p>
        <p id="card_email">Email:aa@gmail</p>
        <p id="card_mobile">Mobile Number: 1111111111</p>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
